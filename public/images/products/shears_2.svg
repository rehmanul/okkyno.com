<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-shears-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#546E7A" />
      <stop offset="100%" stop-color="#37474F" />
    </linearGradient>
    <pattern id="pattern-shears-2" patternUnits="userSpaceOnUse" width="30" height="30" patternTransform="rotate(45)">
      <rect width="30" height="30" fill="url(#grad-shears-2)" />
      <circle cx="15" cy="15" r="2" fill="#78909C" fill-opacity="0.3" />
