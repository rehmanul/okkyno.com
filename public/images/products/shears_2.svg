  <rect width="400" height="400" fill="url(#pattern-shears-2)" />
  <rect width="400" height="100" y="300" fill="#37474F" opacity="0.2" />
  <text x="200" y="190" fill="white" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#shadow)">Pruning Shears</text>
  <text x="200" y="230" fill="white" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#shadow)">Open Position</text>
