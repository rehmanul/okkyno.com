<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f8ef"/>
  
  <!-- Person -->
  <g transform="translate(400, 300) scale(2.5)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#f4d5c2"/>
    
    <!-- Hair -->
    <path d="M-25 -30 Q-25 -60 0 -60 Q25 -60 25 -30 Q20 -50 0 -52 Q-20 -50 -25 -30 Z" fill="#8b4513"/>
    
    <!-- Eyes -->
    <ellipse cx="-8" cy="-32" rx="3" ry="2" fill="#3d2314"/>
    <ellipse cx="8" cy="-32" rx="3" ry="2" fill="#3d2314"/>
    
    <!-- Smile -->
    <path d="M-10 -20 Q0 -14 10 -20" stroke="#3d2314" stroke-width="1.5" fill="none"/>
    
    <!-- Shirt -->
    <rect x="-20" y="-5" width="40" height="45" fill="#8cb369"/>
    <path d="M0 -5 L-20 -5 L-25 -15 L-5 -15 Z" fill="#8cb369"/>
    <path d="M0 -5 L20 -5 L25 -15 L5 -15 Z" fill="#8cb369"/>
    
    <!-- Gardening tools -->
    <line x1="-10" y1="20" x2="-10" y2="-10" stroke="#8b5a2b" stroke-width="2"/>
    <path d="M-10 -10 L-15 -15 L-5 -15 Z" fill="#4c7c3f"/>
  </g>
  
  <!-- Plants -->
  <g transform="translate(250, 480)">
    <path d="M0 0 C-20 -30 -40 -20 -30 -50 C-20 -40 0 -60 20 -40 C40 -20 20 -30 0 0 Z" fill="#8cb369"/>
    <rect x="-5" y="0" width="10" height="20" fill="#8b5a2b"/>
  </g>
  
  <g transform="translate(550, 520)">
    <path d="M0 0 C-10 -20 -30 -10 -20 -30 C-10 -20 0 -40 10 -20 C30 -10 10 -20 0 0 Z" fill="#8cb369"/>
    <rect x="-4" y="0" width="8" height="15" fill="#8b5a2b"/>
  </g>
  
  <!-- Notebook or writing pad -->
  <g transform="translate(620, 400)">
    <rect x="-30" y="-40" width="60" height="80" fill="#fff" stroke="#ccc"/>
    <line x1="-20" y1="-25" x2="20" y2="-25" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="-5" x2="20" y2="-5" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="5" x2="20" y2="5" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="15" x2="20" y2="15" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="25" x2="10" y2="25" stroke="#999" stroke-width="1"/>
  </g>
  
  <!-- Label -->
  <rect x="200" y="500" width="400" height="80" rx="10" ry="10" fill="rgba(255, 255, 255, 0.8)"/>
  <text x="400" y="550" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Sarah Johnson, Head of Content</text>
</svg>