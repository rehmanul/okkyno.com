<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f9f0"/>
  
  <!-- Person -->
  <g transform="translate(400, 300) scale(2.5)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#e6c3a5"/>
    
    <!-- Hair -->
    <path d="M-25 -30 Q-25 -55 0 -55 Q25 -55 25 -30 Q15 -40 0 -42 Q-15 -40 -25 -30 Z" fill="#4a3728"/>
    
    <!-- Eyes -->
    <ellipse cx="-8" cy="-32" rx="3" ry="2" fill="#3d2314"/>
    <ellipse cx="8" cy="-32" rx="3" ry="2" fill="#3d2314"/>
    
    <!-- Smile -->
    <path d="M-10 -20 Q0 -15 10 -20" stroke="#3d2314" stroke-width="1.5" fill="none"/>
    
    <!-- Shirt -->
    <rect x="-20" y="-5" width="40" height="45" fill="#4c7c3f"/>
    <path d="M0 -5 L-20 -5 L-25 -15 L-5 -15 Z" fill="#4c7c3f"/>
    <path d="M0 -5 L20 -5 L25 -15 L5 -15 Z" fill="#4c7c3f"/>
    <circle cx="0" cy="5" r="3" fill="#fff"/>
    
    <!-- Garden Tool -->
    <line x1="-35" y1="20" x2="35" y2="20" stroke="#8b5a2b" stroke-width="3"/>
    <path d="M-30 20 Q-30 10 -35 5 Q-25 5 -22 15 Z" fill="#8b5a2b"/>
  </g>
  
  <!-- Plants in foreground -->
  <g transform="translate(200, 500)">
    <path d="M0 0 Q-10 -30 -20 -40 Q-10 -35 0 -50 Q10 -35 20 -40 Q10 -30 0 0 Z" fill="#4c7c3f"/>
    <rect x="-5" y="0" width="10" height="20" fill="#8b5a2b"/>
  </g>
  
  <g transform="translate(600, 480)">
    <path d="M0 0 Q-15 -40 -25 -60 Q-5 -50 0 -70 Q5 -50 25 -60 Q15 -40 0 0 Z" fill="#4c7c3f"/>
    <rect x="-7" y="0" width="14" height="25" fill="#8b5a2b"/>
  </g>
  
  <!-- Label -->
  <rect x="200" y="500" width="400" height="80" rx="10" ry="10" fill="rgba(255, 255, 255, 0.8)"/>
  <text x="400" y="550" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">John Smith, Founder & CEO</text>
</svg>