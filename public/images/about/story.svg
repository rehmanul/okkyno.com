<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f7f4"/>
  
  <!-- Timeline -->
  <line x1="100" y1="100" x2="100" y2="500" stroke="#406143" stroke-width="6" stroke-dasharray="1, 15" stroke-linecap="round"/>
  
  <!-- Timeline Nodes -->
  <circle cx="100" cy="150" r="15" fill="#83be71" stroke="#406143" stroke-width="3"/>
  <circle cx="100" cy="250" r="15" fill="#83be71" stroke="#406143" stroke-width="3"/>
  <circle cx="100" cy="350" r="15" fill="#83be71" stroke="#406143" stroke-width="3"/>
  <circle cx="100" cy="450" r="15" fill="#83be71" stroke="#406143" stroke-width="3"/>
  
  <!-- Timeline Content: Beginning -->
  <rect x="130" y="120" width="250" height="60" rx="10" ry="10" fill="white" stroke="#83be71" stroke-width="2"/>
  <text x="140" y="145" font-family="Arial" font-size="18" font-weight="bold" fill="#406143">The Beginning</text>
  <text x="140" y="165" font-family="Arial" font-size="14" fill="#333">Started as a small gardening blog</text>
  
  <g transform="translate(450, 150)">
    <rect x="-40" y="-40" width="80" height="80" rx="5" ry="5" fill="#fff" stroke="#ccc"/>
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#83be71" stroke-width="2"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#83be71" stroke-width="2"/>
    <line x1="-30" y1="0" x2="20" y2="0" stroke="#83be71" stroke-width="2"/>
    <line x1="-30" y1="10" x2="25" y2="10" stroke="#83be71" stroke-width="2"/>
    <line x1="-30" y1="20" x2="15" y2="20" stroke="#83be71" stroke-width="2"/>
    <path d="M-60 -60 L-60 60 L60 60 L60 -60 Z" fill="none"/>
  </g>
  
  <!-- Timeline Content: Growing -->
  <rect x="130" y="220" width="250" height="60" rx="10" ry="10" fill="white" stroke="#83be71" stroke-width="2"/>
  <text x="140" y="245" font-family="Arial" font-size="18" font-weight="bold" fill="#406143">Growing Community</text>
  <text x="140" y="265" font-family="Arial" font-size="14" fill="#333">Expanded to reach more gardeners</text>
  
  <g transform="translate(450, 250)">
    <circle cx="-25" cy="0" r="20" fill="#f4d5c2"/>
    <path d="M-40 0 Q-40 -20 -25 -20 Q-10 -20 -10 0 Q-15 -15 -25 -15 Q-35 -15 -40 0" fill="#8B4513"/>
    <circle cx="0" cy="-15" r="15" fill="#f4d5c2"/>
    <path d="M-10 -15 Q-10 -30 0 -30 Q10 -30 10 -15 Q5 -25 0 -25 Q-5 -25 -10 -15" fill="#8B4513"/>
    <circle cx="25" cy="0" r="20" fill="#f4d5c2"/>
    <path d="M10 0 Q10 -20 25 -20 Q40 -20 40 0 Q35 -15 25 -15 Q15 -15 10 0" fill="#8B4513"/>
    <path d="M-60 -60 L-60 60 L60 60 L60 -60 Z" fill="none"/>
  </g>
  
  <!-- Timeline Content: Innovation -->
  <rect x="130" y="320" width="250" height="60" rx="10" ry="10" fill="white" stroke="#83be71" stroke-width="2"/>
  <text x="140" y="345" font-family="Arial" font-size="18" font-weight="bold" fill="#406143">Innovation</text>
  <text x="140" y="365" font-family="Arial" font-size="14" fill="#333">Developing new gardening solutions</text>
  
  <g transform="translate(450, 350)">
    <rect x="-30" y="-30" width="60" height="60" fill="#fff" stroke="#406143" stroke-width="2"/>
    <line x1="-35" y1="-35" x2="35" y2="35" stroke="#406143" stroke-width="2"/>
    <line x1="-35" y1="35" x2="35" y2="-35" stroke="#406143" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#83be71"/>
    <path d="M-5 -5 L5 -5 L5 5 L-5 5 Z" fill="#406143"/>
    <path d="M-60 -60 L-60 60 L60 60 L60 -60 Z" fill="none"/>
  </g>
  
  <!-- Timeline Content: Today -->
  <rect x="130" y="420" width="250" height="60" rx="10" ry="10" fill="white" stroke="#83be71" stroke-width="2"/>
  <text x="140" y="445" font-family="Arial" font-size="18" font-weight="bold" fill="#406143">Today</text>
  <text x="140" y="465" font-family="Arial" font-size="14" fill="#333">A global gardening resource</text>
  
  <g transform="translate(450, 450)">
    <!-- World map simplified outline -->
    <path d="M-50 -10 Q-40 -30 -20 -20 Q0 -40 20 -20 Q40 -30 50 -10 Q40 10 20 0 Q0 20 -20 0 Q-40 10 -50 -10 Z" fill="#83be71" stroke="#406143" stroke-width="1"/>
    <circle cx="-30" cy="-5" r="3" fill="#406143"/>
    <circle cx="-10" cy="5" r="3" fill="#406143"/>
    <circle cx="20" cy="-10" r="3" fill="#406143"/>
    <circle cx="30" cy="5" r="3" fill="#406143"/>
    <path d="M-60 -60 L-60 60 L60 60 L60 -60 Z" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle" fill="#406143">Our Story</text>
  <text x="400" y="80" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">The growth and evolution of our gardening community</text>
</svg>