<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f7f4"/>
  
  <!-- Abstract plant pattern background -->
  <g opacity="0.1" fill="#2e7d32">
    <circle cx="100" cy="100" r="50"/>
    <circle cx="300" cy="150" r="40"/>
    <circle cx="500" cy="100" r="60"/>
    <circle cx="700" cy="150" r="45"/>
    <circle cx="100" cy="400" r="55"/>
    <circle cx="300" cy="450" r="50"/>
    <circle cx="500" cy="400" r="40"/>
    <circle cx="700" cy="450" r="60"/>
  </g>
  
  <!-- Main plant illustration -->
  <g transform="translate(400, 300)">
    <!-- Pot -->
    <path d="M-100 100 L-120 0 L120 0 L100 100 Z" fill="#8d6e63"/>
    <ellipse cx="0" cy="0" rx="120" ry="20" fill="#a1887f"/>
    
    <!-- Soil -->
    <ellipse cx="0" cy="0" rx="100" ry="15" fill="#5d4037"/>
    
    <!-- Main stem -->
    <path d="M0 0 C0 -100 0 -200 0 -300" stroke="#8bc34a" stroke-width="8" fill="none"/>
    
    <!-- Leaves -->
    <path d="M0 -50 C-40 -30 -80 -40 -100 -80 C-60 -80 -20 -90 0 -50 Z" fill="#4caf50"/>
    <path d="M0 -100 C40 -80 80 -90 100 -130 C60 -130 20 -140 0 -100 Z" fill="#4caf50"/>
    <path d="M0 -150 C-40 -130 -80 -140 -100 -180 C-60 -180 -20 -190 0 -150 Z" fill="#4caf50"/>
    <path d="M0 -200 C40 -180 80 -190 100 -230 C60 -230 20 -240 0 -200 Z" fill="#4caf50"/>
    <path d="M0 -250 C-40 -230 -80 -240 -100 -280 C-60 -280 -20 -290 0 -250 Z" fill="#4caf50"/>
    
    <!-- Flower/fruit -->
    <circle cx="0" cy="-300" r="20" fill="#ff9800"/>
    <circle cx="10" cy="-290" r="5" fill="#ffeb3b"/>
    <circle cx="-10" cy="-290" r="5" fill="#ffeb3b"/>
    <circle cx="10" cy="-310" r="5" fill="#ffeb3b"/>
    <circle cx="-10" cy="-310" r="5" fill="#ffeb3b"/>
  </g>
  
  <!-- Text placeholder elements -->
  <g transform="translate(400, 500)">
    <rect x="-300" y="-30" width="600" height="10" rx="5" ry="5" fill="#90a4ae"/>
    <rect x="-250" y="-10" width="500" height="10" rx="5" ry="5" fill="#90a4ae"/>
    <rect x="-200" y="10" width="400" height="10" rx="5" ry="5" fill="#90a4ae"/>
    <rect x="-150" y="30" width="300" height="10" rx="5" ry="5" fill="#90a4ae"/>
  </g>
  
  <!-- Title placeholder -->
  <rect x="200" y="40" width="400" height="60" rx="10" ry="10" fill="rgba(255, 255, 255, 0.8)"/>
  <text x="400" y="80" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle" fill="#2e7d32">Gardening Article</text>
</svg>